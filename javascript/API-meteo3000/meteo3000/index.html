<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Meteo 3000</title>

        <!--
        BIBLIOTHÈQUE CSS EXTERNE
        On charge Bootstrap depuis un CDN (Content Delivery Network).
        Un CDN est un serveur distant qui héberge des fichiers publics
        (CSS, JS, images) pour qu'on n'ait pas à les stocker localement.
        L'attribut "integrity" sert à vérifier que le fichier n'a pas été
        modifié en chemin (technique de sécurité : SRI - Subresource Integrity).
    -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />

        <!--
        CHARGEMENT DES SCRIPTS JAVASCRIPT
        L'attribut "defer" est essentiel :
        - Sans defer : le navigateur bloque le rendu HTML pendant qu'il charge et exécute le JS.
        - Avec defer  : le navigateur charge le JS en parallèle, puis l'exécute
                        APRÈS que tout le HTML est construit (DOM prêt).
        Cela garantit que nos scripts peuvent trouver les éléments HTML
        (les <select>, le <main>...) sans erreur.

        Ordre de chargement :
        1. script.js → remplit les listes déroulantes via l'API Géo du gouvernement
        2. meteo.js  → définit la fonction Meteo() utilisée par script.js
    -->
        <script src="js/script.js" defer></script>
        <script src="js/meteo.js" defer></script>

        <style>
            footer {
                position: absolute;
                bottom: 0;
            }
        </style>
    </head>

    <body style="text-align: center">
        <header class="container-fluid my-5">
            <h1 class="title">Meteo 3000 - La météo du futur</h1>
        </header>

        <!--
        FORMULAIRE DE SÉLECTION
        Ce formulaire ne fait PAS de soumission classique (pas de bouton submit,
        pas d'action vers un serveur). À la place, des écouteurs d'événements
        JavaScript déclenchent des appels API dynamiques à chaque changement
        de valeur dans les listes déroulantes.

        Flux utilisateur :
        1. L'utilisateur choisit un département  → chargement des communes
        2. L'utilisateur choisit une commune     → affichage de la météo
    -->
        <form class="container">
            <div class="my-3">
                <label for="departement">Choisir son département</label>
                <!--
                Cette liste est vide au chargement.
                Elle sera remplie dynamiquement par script.js
                après l'appel à l'API gouvernementale.
            -->
                <select class="form-select" id="departement">
                    <option selected>Votre département</option>
                </select>
            </div>
            <div class="my-3">
                <label for="commune">Choisir sa commune</label>
                <!--
                Cette liste est également vide au départ.
                Elle se remplit après la sélection d'un département.
            -->
                <select class="form-select" id="commune">
                    <option selected>Votre commune</option>
                </select>
            </div>
        </form>

        <!--
        ZONE D'AFFICHAGE DES RÉSULTATS
        Cet élément est intentionnellement vide dans le HTML.
        C'est le JavaScript (meteo.js) qui y injectera dynamiquement
        le contenu météo via la manipulation du DOM.
    -->
        <main id="main" class="container"></main>

        <!--
        ZONE PÉDAGOGIQUE : RÉPONSE BRUTE DE L'API
        Cette section affiche le JSON tel que l'API le renvoie,
        pour que l'on puisse explorer sa structure directement dans la page.
        La balise <details> est native HTML5 : elle crée un bloc repliable
        sans JavaScript ni bibliothèque externe.
    -->
        <section id="json-section" class="container my-5" style="display: none; text-align: left">
            <details>
                <summary style="cursor: pointer; font-weight: bold; margin-bottom: 0.5rem">
                    Réponse brute de l'API (JSON)
                </summary>
                <pre
                    id="json-output"
                    style="
                        background: #1e1e1e;
                        color: #d4d4d4;
                        padding: 1rem;
                        border-radius: 6px;
                        overflow-x: auto;
                        font-size: 0.8rem;
                        max-height: 400px;
                        overflow-y: auto;
                    "
                ></pre>
            </details>
        </section>

        <footer class="container-fluid">
            <p>Merci à <a href="https://prevision-meteo.ch">prevision-meteo.ch</a> pour le service</p>
        </footer>
    </body>
</html>
