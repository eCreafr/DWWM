<!doctype html>
<html lang="fr" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dark mode — Circle clip-path transition</title>
        <style>
            /* ── View Transition : désactive l'animation par défaut ── */
            ::view-transition-old(root),
            ::view-transition-new(root) {
                animation: none;
                mix-blend-mode: normal;
            }

            /* ── Tokens ── */
            :root {
                --bg: #f5f5f0;
                --surface: #ffffff;
                --text: #1a1a1a;
                --text-muted: #666;
                --accent: #5b4fff;
                --border: #e0e0e0;
                --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            }
            [data-theme='dark'] {
                --bg: #111118;
                --surface: #1e1e2a;
                --text: #ebebeb;
                --text-muted: #888;
                --accent: #9d8fff;
                --border: #2e2e3e;
                --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
            }

            /* ── Reset minimal ── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: system-ui, sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2rem;
                padding: 2rem;
                transition:
                    background 0.15s,
                    color 0.15s;
            }

            /* ── Bouton switch ── */
            #theme-toggle {
                position: fixed;
                top: 1.25rem;
                right: 1.25rem;
                width: 46px;
                height: 46px;
                border-radius: 50%;
                border: 2px solid var(--border);
                background: var(--surface);
                box-shadow: var(--shadow);
                cursor: pointer;
                font-size: 1.3rem;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    border-color 0.2s,
                    background 0.2s;
            }
            #theme-toggle:hover {
                border-color: var(--accent);
            }

            /* ── Démo ── */
            .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 1rem;
                padding: 2rem 2.5rem;
                max-width: 420px;
                width: 100%;
                box-shadow: var(--shadow);
            }
            .card h1 {
                font-size: 1.4rem;
                margin-bottom: 0.5rem;
            }
            .card p {
                color: var(--text-muted);
                font-size: 0.95rem;
                line-height: 1.6;
                margin-bottom: 1.25rem;
            }

            .badge {
                display: inline-block;
                background: var(--accent);
                color: #fff;
                font-size: 0.75rem;
                font-weight: 600;
                letter-spacing: 0.05em;
                padding: 0.25rem 0.75rem;
                border-radius: 999px;
            }

            .note {
                font-size: 0.8rem;
                color: var(--text-muted);
                text-align: center;
            }
        </style>
    </head>
    <body>
        <button id="theme-toggle" title="Changer le thème" aria-label="Changer le thème">🌙</button>

        <div class="card">
            <h1>Circle clip-path transition</h1>
            <p>
                L'animation utilise <strong>View Transitions API</strong> combinée à un <code>clipPath</code> animé en
                cercle depuis le centre du bouton. <br /><br />source / tuto :
                <a href="https://grafikart.fr/tutoriels/theme-switcher-circle-2315" target="_blank">grafikart.fr </a>
            </p>
            <span class="badge" id="theme-label">Thème clair</span>
        </div>

        <p class="note">Cliquez sur le bouton en haut à droite ↗</p>

        <script>
            const root = document.documentElement;
            const btn = document.getElementById('theme-toggle');
            const label = document.getElementById('theme-label');

            function applyTheme(theme) {
                root.dataset.theme = theme;
                btn.textContent = theme === 'dark' ? '☀️' : '🌙';
                label.textContent = theme === 'dark' ? 'Thème sombre' : 'Thème clair';
            }

            async function switchTheme(element) {
                const nextTheme = root.dataset.theme === 'dark' ? 'light' : 'dark';

                // Fallback sans animation
                if (!document.startViewTransition || window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    applyTheme(nextTheme);
                    return;
                }

                // Coordonnées du centre du bouton
                const { top, left, width, height } = element.getBoundingClientRect();
                const x = left + width / 2;
                const y = top + height / 2;

                // Rayon max pour couvrir tout l'écran
                const right = window.innerWidth - x;
                const bottom = window.innerHeight - y;
                const radius = Math.hypot(Math.max(x, right), Math.max(y, bottom));

                const transition = document.startViewTransition(() => applyTheme(nextTheme));

                await transition.ready;

                document.documentElement.animate(
                    {
                        clipPath: [`circle(0px at ${x}px ${y}px)`, `circle(${radius}px at ${x}px ${y}px)`],
                    },
                    {
                        duration: 600,
                        easing: 'ease-in-out',
                        pseudoElement: '::view-transition-new(root)',
                    }
                );
            }

            btn.addEventListener('click', () => switchTheme(btn));
        </script>
    </body>
</html>
